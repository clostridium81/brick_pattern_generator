<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Brick Pattern Generator</title>
<style>
  :root {
    --bg: #1f2024;
    --panel: #2a2c33;
    --panel-2: #34373f;
    --text: #ececec;
    --muted: #9aa0a6;
    --accent: #ff8a65;
    --accent-2: #4fc3f7;
    --border: #404249;
    --gap: #fffaf0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
  }
  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px 28px;
    align-items: center;
  }
  .group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .group > label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  input[type="number"] {
    width: 80px;
    padding: 6px 8px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  input[type="color"] {
    width: 38px;
    height: 38px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--panel-2);
    cursor: pointer;
  }
  input[type="color"]:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .seg {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg input { display: none; }
  .seg label {
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border);
  }
  .seg label:last-of-type { border-right: none; }
  .seg input:checked + label {
    background: var(--accent);
    color: #1a1a1a;
    font-weight: 600;
  }
  button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #3f4249; border-color: #555; }
  button.primary {
    background: var(--accent);
    color: #1a1a1a;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover { background: #ff7043; border-color: #ff7043; }
  button.ghost {
    background: transparent;
  }
  .preview-wrap {
    background: repeating-conic-gradient(#2a2c33 0% 25%, #303239 0% 50%) 50% / 24px 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 360px;
    overflow: auto;
  }
  #preview {
    max-width: 100%;
    max-height: 80vh;
    height: auto;
    display: block;
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    border-radius: 4px;
  }
  .meta {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .credit {
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="app">
  <header style="display:flex; align-items:baseline; justify-content:space-between;">
    <h1>Brick Pattern Generator</h1>
    <span class="credit">SVG &rarr; PNG &middot; ブラウザローカル動作</span>
  </header>

  <section class="panel">
    <div class="group">
      <label>サイズ</label>
      <input type="number" id="width" value="1920" min="64" max="7680" step="1">
      <span style="color:var(--muted);">×</span>
      <input type="number" id="height" value="1080" min="64" max="7680" step="1">
      <span style="color:var(--muted); font-size:12px;">px</span>
    </div>

    <div class="group">
      <label>色数</label>
      <div class="seg" id="colorCountSeg">
        <input type="radio" name="colorCount" value="3" id="cc3">
        <label for="cc3">3色</label>
        <input type="radio" name="colorCount" value="4" id="cc4" checked>
        <label for="cc4">4色</label>
      </div>
    </div>

    <div class="group" id="colorsGroup">
      <label>カラー</label>
      <input type="color" data-idx="0" value="#ece2cf">
      <input type="color" data-idx="1" value="#dcc9ae">
      <input type="color" data-idx="2" value="#c5b89a">
      <input type="color" data-idx="3" value="#b8c4a8">
    </div>

    <div class="group">
      <label>塗り方</label>
      <div class="seg" id="fillSeg">
        <input type="radio" name="fillMode" value="solid" id="fmSolid" checked>
        <label for="fmSolid">単色</label>
        <input type="radio" name="fillMode" value="tileGrad" id="fmTile">
        <label for="fmTile">タイル内グラデ</label>
        <input type="radio" name="fillMode" value="bgGrad" id="fmBg">
        <label for="fmBg">背景グラデ</label>
      </div>
    </div>

    <div class="group" style="margin-left:auto;">
      <button id="btnRandom" class="ghost">🔀 再ランダム</button>
      <button id="btnDownload" class="primary">⬇ PNG保存</button>
    </div>
  </section>

  <div class="preview-wrap">
    <svg id="preview" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="meta" id="metaLine">—</div>
</div>

<script>
'use strict';

const SVG_NS = 'http://www.w3.org/2000/svg';

// ---------- PRNG (mulberry32) ----------
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

// ---------- DOM refs ----------
const $width = document.getElementById('width');
const $height = document.getElementById('height');
const $svg = document.getElementById('preview');
const $meta = document.getElementById('metaLine');
const $colorInputs = Array.from(document.querySelectorAll('#colorsGroup input[type=color]'));

let currentSeed = Math.floor(Math.random() * 2 ** 31);

// ---------- Inputs ----------
function getColorCount() {
  return Number(document.querySelector('input[name="colorCount"]:checked').value);
}
function getFillMode() {
  return document.querySelector('input[name="fillMode"]:checked').value;
}
function getColors() {
  const n = getColorCount();
  return $colorInputs.slice(0, n).map(el => el.value);
}
function syncColorInputsEnabled() {
  const n = getColorCount();
  $colorInputs.forEach((el, i) => { el.disabled = i >= n; });
}

// ---------- Brick layout ----------
function generateBricks(width, height, rng) {
  // Sizes scale slightly with canvas so 4K isn't covered in postage-stamps
  const scale = Math.max(1, Math.min(2.2, Math.min(width, height) / 800));
  const ROW_HEIGHTS = [28, 38, 50, 64].map(v => Math.round(v * scale));
  const TILE_WIDTHS = [60, 90, 120, 160].map(v => Math.round(v * scale));
  const GAP = Math.max(3, Math.round(6 * scale));

  const bricks = [];
  let y = 0;
  while (y < height) {
    const h = pick(ROW_HEIGHTS, rng);
    let x = -Math.floor(pick(TILE_WIDTHS, rng) * rng());
    while (x < width) {
      const w = pick(TILE_WIDTHS, rng);
      bricks.push({
        x: x + GAP / 2,
        y: y + GAP / 2,
        w: w - GAP,
        h: h - GAP
      });
      x += w;
    }
    y += h;
  }
  return bricks;
}

function pickColorForTile(prev, colors, rng) {
  if (colors.length <= 1) return colors[0];
  for (let tries = 0; tries < 4; tries++) {
    const c = pick(colors, rng);
    if (c !== prev) return c;
  }
  return pick(colors, rng);
}

// ---------- Render SVG ----------
function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function renderSvg(width, height, colors, fillMode, rng) {
  clearChildren($svg);
  $svg.setAttribute('xmlns', SVG_NS);
  $svg.setAttribute('width', String(width));
  $svg.setAttribute('height', String(height));
  $svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  $svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  const defs = document.createElementNS(SVG_NS, 'defs');
  $svg.appendChild(defs);

  // Background layer
  if (fillMode === 'bgGrad') {
    const gradId = 'bgGrad';
    const grad = document.createElementNS(SVG_NS, 'linearGradient');
    grad.setAttribute('id', gradId);
    grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
    grad.setAttribute('x2', '0%'); grad.setAttribute('y2', '100%');
    colors.forEach((c, i) => {
      const stop = document.createElementNS(SVG_NS, 'stop');
      stop.setAttribute('offset', `${(i / Math.max(1, colors.length - 1)) * 100}%`);
      stop.setAttribute('stop-color', c);
      grad.appendChild(stop);
    });
    defs.appendChild(grad);
    const bg = document.createElementNS(SVG_NS, 'rect');
    bg.setAttribute('x', '0'); bg.setAttribute('y', '0');
    bg.setAttribute('width', String(width));
    bg.setAttribute('height', String(height));
    bg.setAttribute('fill', `url(#${gradId})`);
    $svg.appendChild(bg);
  } else {
    // Solid gap color background — shows through the gaps between tiles
    const bg = document.createElementNS(SVG_NS, 'rect');
    bg.setAttribute('x', '0'); bg.setAttribute('y', '0');
    bg.setAttribute('width', String(width));
    bg.setAttribute('height', String(height));
    bg.setAttribute('fill', '#fffaf0');
    $svg.appendChild(bg);
  }

  // Bricks
  const bricks = generateBricks(width, height, rng);
  let prevColor = null;
  let gradCounter = 0;

  bricks.forEach(b => {
    if (b.w <= 0 || b.h <= 0) return;
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', String(b.x));
    rect.setAttribute('y', String(b.y));
    rect.setAttribute('width', String(b.w));
    rect.setAttribute('height', String(b.h));
    rect.setAttribute('rx', '2');
    rect.setAttribute('ry', '2');

    if (fillMode === 'tileGrad' && colors.length >= 2) {
      // Pick two distinct colors
      const c1 = pickColorForTile(prevColor, colors, rng);
      const c2 = pickColorForTile(c1, colors, rng);
      prevColor = c1;

      const gid = 'tg' + (gradCounter++);
      const grad = document.createElementNS(SVG_NS, 'linearGradient');
      grad.setAttribute('id', gid);
      // direction: 0=vertical, 1=horizontal, 2=diag
      const dir = Math.floor(rng() * 3);
      if (dir === 0) {
        grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
        grad.setAttribute('x2', '0%'); grad.setAttribute('y2', '100%');
      } else if (dir === 1) {
        grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
        grad.setAttribute('x2', '100%'); grad.setAttribute('y2', '0%');
      } else {
        grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
        grad.setAttribute('x2', '100%'); grad.setAttribute('y2', '100%');
      }
      const s1 = document.createElementNS(SVG_NS, 'stop');
      s1.setAttribute('offset', '0%');
      s1.setAttribute('stop-color', c1);
      const s2 = document.createElementNS(SVG_NS, 'stop');
      s2.setAttribute('offset', '100%');
      s2.setAttribute('stop-color', c2);
      grad.appendChild(s1); grad.appendChild(s2);
      defs.appendChild(grad);

      rect.setAttribute('fill', `url(#${gid})`);
    } else {
      const c = pickColorForTile(prevColor, colors, rng);
      prevColor = c;
      rect.setAttribute('fill', c);
    }

    $svg.appendChild(rect);
  });

  $meta.textContent = `${width} × ${height} px / ${bricks.length} tiles / seed ${currentSeed}`;
}

// ---------- PNG download ----------
async function downloadPng() {
  const w = Number($width.value);
  const h = Number($height.value);
  // Clone SVG and ensure it has a self-contained xmlns (it already has one)
  const xml = new XMLSerializer().serializeToString($svg);
  const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);
  try {
    const img = new Image();
    img.decoding = 'sync';
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url;
    });
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    const a = document.createElement('a');
    a.download = `brick-${w}x${h}-${Date.now()}.png`;
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    a.remove();
  } finally {
    URL.revokeObjectURL(url);
  }
}

// ---------- Orchestration ----------
function regenerate(newSeed) {
  if (newSeed) currentSeed = Math.floor(Math.random() * 2 ** 31);
  syncColorInputsEnabled();
  const w = Math.max(64, Math.min(7680, Number($width.value) || 1920));
  const h = Math.max(64, Math.min(7680, Number($height.value) || 1080));
  $width.value = w; $height.value = h;
  const rng = mulberry32(currentSeed);
  renderSvg(w, h, getColors(), getFillMode(), rng);
}

// ---------- Events ----------
document.getElementById('btnRandom').addEventListener('click', () => regenerate(true));
document.getElementById('btnDownload').addEventListener('click', () => {
  downloadPng().catch(err => {
    console.error(err);
    alert('PNG生成に失敗しました: ' + err.message);
  });
});
$width.addEventListener('change', () => regenerate(false));
$height.addEventListener('change', () => regenerate(false));
document.querySelectorAll('input[name="colorCount"]').forEach(el =>
  el.addEventListener('change', () => regenerate(false))
);
document.querySelectorAll('input[name="fillMode"]').forEach(el =>
  el.addEventListener('change', () => regenerate(false))
);
$colorInputs.forEach(el =>
  el.addEventListener('input', () => regenerate(false))
);

// Initial render
regenerate(false);
</script>
</body>
</html>
